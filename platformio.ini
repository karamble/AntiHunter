[platformio]
src_dir = .

[env]
platform = espressif32@^6.9.0
framework = arduino
monitor_speed = 115200
build_flags =
 -D CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY=1

[env:halberd-full]
extends = env
board = seeed_xiao_esp32s3
build_src_filter = -<*>+<Halberd/full/src/*>+<Halberd/shared/*>
monitor_speed = 115200
extra_scripts = post:scripts/set_rtc_time.py
lib_deps =
 esp32async/ESPAsyncWebServer@3.10.0
 esp32async/AsyncTCP@3.4.10
 mikalhart/TinyGPSPlus@1.1.0
 h2zero/NimBLE-Arduino@2.3.9
 adafruit/RTClib@2.1.4
 bblanchon/ArduinoJson@6.21.6
build_flags =
 ${env.build_flags}
 -D ARDUINO_USB_CDC_ON_BOOT=1
 -D ARDUINO_USB_MODE=1
 -D CONFIG_BT_NIMBLE_ENABLED=1
 -D CONFIG_ESP32_WIFI_RAW_FRAME_SANITY_CHECK=0
 -IHalberd/shared
check_tool = cppcheck
check_skip_packages = yes
check_src_filters = +<Halberd/full/src/*>+<Halberd/shared/*> -<Halberd/full/src/wifi.c> -<Halberd/full/src/opendroneid.c>
check_flags =
            --enable=all
            --std=c++17
            --suppress=missingIncludeSystem
            --suppress=missingInclude
            --suppress=checkersReport
            --suppress=unusedFunction
            --inline-suppr
            -DPROGMEM=

[env:halberd-headless]
extends = env
board = seeed_xiao_esp32s3
build_src_filter = -<*>+<Halberd/headless/src/*>+<Halberd/shared/*>
monitor_speed = 115200
extra_scripts = post:scripts/set_rtc_time.py
lib_deps =
 mikalhart/TinyGPSPlus@1.1.0
 h2zero/NimBLE-Arduino@2.3.9
 adafruit/RTClib@2.1.4
 bblanchon/ArduinoJson@6.21.6
build_flags =
 ${env.build_flags}
 -D ARDUINO_USB_CDC_ON_BOOT=1
 -D ARDUINO_USB_MODE=1
 -D CONFIG_BT_NIMBLE_ENABLED=1
 -D CONFIG_ESP32_WIFI_RAW_FRAME_SANITY_CHECK=0
 -IHalberd/shared
check_tool = cppcheck
check_skip_packages = yes
check_src_filters = +<Halberd/headless/src/*>+<Halberd/shared/*> -<Halberd/headless/src/wifi.c> -<Halberd/headless/src/opendroneid.c>
check_flags =
            --enable=all
            --std=c++17
            --suppress=missingIncludeSystem
            --suppress=missingInclude
            --suppress=checkersReport
            --suppress=unusedFunction
            --inline-suppr
            -DPROGMEM=
